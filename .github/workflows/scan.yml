name: Scan iPhone (alertes Discord)

# Déclenché par cron-job.org (toutes les 15 min) via workflow_dispatch.
# Les données vont dans Supabase (plus de base commitée dans git).
on:
  workflow_dispatch:

# Un seul scan à la fois (les suivants attendent).
concurrency:
  group: scan-iphone
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Scan + alertes Discord
        env:
          SIMULATION_MODE: "false"
          ALERTES_IMMEDIATES: "true"      # pousse les bonnes opportunités dès le scan
          SEUIL_ALERTE_SCORE: "55"        # seuil d'alerte (plus bas = plus d'opportunités)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}   # Supabase (Postgres)
          DISCORD_WEBHOOK_ALERTES: ${{ secrets.DISCORD_WEBHOOK_ALERTES }}
          DISCORD_WEBHOOK_RAPPORT: ${{ secrets.DISCORD_WEBHOOK_RAPPORT }}
          LBC_EMAIL: ${{ secrets.LBC_EMAIL }}
          LBC_PASSWORD: ${{ secrets.LBC_PASSWORD }}
        run: python -m backend.job scan
