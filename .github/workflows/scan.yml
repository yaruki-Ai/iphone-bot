name: Scan iPhone (alertes Discord)

# Fait tourner le bot gratuitement 24/7, même PC éteint.
on:
  schedule:
    - cron: "*/20 * * * *"   # toutes les 20 minutes (granularité mini de GitHub)
  workflow_dispatch:           # bouton "Run workflow" pour tester manuellement

permissions:
  contents: write              # pour committer la base entre deux exécutions

concurrency:
  group: scan-iphone
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Scan + alertes Discord
        env:
          SIMULATION_MODE: "false"
          ALERTES_IMMEDIATES: "true"      # pousse les bonnes opportunités dès le scan
          SEUIL_ALERTE_SCORE: "55"        # seuil d'alerte (plus bas = plus d'opportunités)
          DISCORD_WEBHOOK_ALERTES: ${{ secrets.DISCORD_WEBHOOK_ALERTES }}
          DISCORD_WEBHOOK_RAPPORT: ${{ secrets.DISCORD_WEBHOOK_RAPPORT }}
          LBC_EMAIL: ${{ secrets.LBC_EMAIL }}
          LBC_PASSWORD: ${{ secrets.LBC_PASSWORD }}
        run: python -m backend.job scan

      - name: Persister la base (dédoublonnage des alertes)
        run: |
          git config user.name "iphone-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f data/iphone_arbitrage.db || true
          git commit -m "scan auto $(date -u +%FT%TZ)" || echo "rien a committer"
          git push || echo "push ignore"
