# =============================================================================
# docker-compose.yml — Déploiement serveur optionnel.
# Persiste la base SQLite et les logs en volumes, charge la config via .env.
# Usage :  docker compose up -d   (puis http://localhost:8000)
# =============================================================================
services:
  bot:
    build: .
    container_name: iphone-arbitrage-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
